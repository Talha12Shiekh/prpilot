name: "PRPilot Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for PRPilot to post comments on the PR
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run PRPilot
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          api-key: ${{ secrets.GEMINI_API_KEY }}
